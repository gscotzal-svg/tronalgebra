<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRON: ARES - ALGEBRA SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root { 
            --neon-red: #ff0022; 
            --neon-glow: rgba(255, 0, 34, 0.6); 
            --bg: #020202; 
            --p2-color: #ff6a00; 
        }
        
        body { 
            margin: 0; 
            font-family: 'Orbitron', sans-serif; 
            background: var(--bg); 
            color: white; 
            overflow: hidden; 
            height: 100vh; 
            text-transform: uppercase; 
        }
        
        body::before { 
            content: ""; 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            background-image: linear-gradient(rgba(255, 0, 34, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 0, 34, 0.03) 1px, transparent 1px); 
            background-size: 40px 40px; 
            z-index: -1; 
        }
        
        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }
        
        .menu-card { 
            background: rgba(0,0,0,0.9); 
            padding: 30px; 
            border: 2px solid var(--neon-red); 
            box-shadow: 0 0 25px var(--neon-glow); 
            text-align: center; 
            width: 380px; 
            max-width: 90%;
        }
        
        input, select, button { 
            background: transparent; 
            border: 1px solid var(--neon-red); 
            color: white; 
            padding: 12px; 
            margin: 8px; 
            width: 90%; 
            font-family: 'Orbitron'; 
            text-align: center; 
            letter-spacing: 1px; 
        }
        
        button { 
            background: var(--neon-red); 
            color: black; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            border: none; 
        }
        
        button:hover { 
            box-shadow: 0 0 20px var(--neon-red); 
            transform: scale(1.02); 
        }
        
        /* Monitor Docente */
        .monitor-table { width: 90%; border-collapse: collapse; margin-top: 20px; background: rgba(0,0,0,0.8); }
        .monitor-table th, .monitor-table td { border: 1px solid var(--neon-red); padding: 12px; text-align: center; font-size: 0.85rem; }
        .monitor-table th { background: var(--neon-red); color: black; }
        
        /* Juego */
        .math-box { 
            background: rgba(0,0,0,0.9); 
            border: 2px solid white; 
            padding: 20px; 
            font-size: 1.8rem; 
            min-width: 150px; 
            text-align: center; 
        }
        
        .opt-card { 
            background: rgba(255,255,255,0.02); 
            border: 1px solid var(--neon-red); 
            color: white; 
            padding: 20px; 
            cursor: pointer; 
            transition: 0.2s; 
            font-size: 1.1rem; 
        }
        
        .opt-card.correct { background: var(--neon-red) !important; color: black; box-shadow: 0 0 30px var(--neon-red); }
        .opt-card.wrong { opacity: 0.2; pointer-events: none; }
        
        .score-badge { position: absolute; top: 40px; font-size: 1.3rem; letter-spacing: 3px; border-bottom: 2px solid var(--neon-red); padding: 5px 15px; }
        sup { font-size: 0.6em; vertical-align: super; }
        
        #next-btn { 
            position: absolute; 
            bottom: 50px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: white; 
            color: black; 
            padding: 18px 50px; 
            font-weight: bold; 
            display: none; 
            z-index: 100; 
        }
        
        #sector-list-container { margin-top: 15px; max-height: 250px; overflow-y: auto; width: 100%; }
    </style>
</head>
<body>

    <!-- MENÚ PRINCIPAL -->
    <div id="scr-init" class="screen active">
        <div class="menu-card">
            <h1 style="text-shadow: 0 0 15px var(--neon-red);">TRON: ARES</h1>
            <button onclick="showScreen('scr-doc-setup')">MODO DOCENTE</button>
            <button onclick="showScreen('scr-est-join')">MODO ESTUDIANTE</button>
        </div>
    </div>

    <!-- DOCENTE: CONFIGURACIÓN -->
    <div id="scr-doc-setup" class="screen">
        <div class="menu-card">
            <h2>NUEVO AULA</h2>
            <input type="text" id="doc-aula-id" placeholder="ID AULA (Ej: MAT-2026)">
            <input type="number" id="doc-num" placeholder="Nº DE PAREJAS" min="1" max="25">
            <select id="doc-op">
                <option value="suma">OPERACIÓN: SUMA</option>
                <option value="resta">OPERACIÓN: RESTA</option>
                <option value="multi">OPERACIÓN: MULTI</option>
                <option value="div">OPERACIÓN: DIVISIÓN</option>
            </select>
            <select id="doc-lv">
                <option value="1">DIFICULTAD: MONOMIOS</option>
                <option value="2">DIFICULTAD: BINOMIOS</option>
                <option value="3">DIFICULTAD: POLINOMIOS</option>
            </select>
            <button onclick="crearAula()">INICIALIZAR RED</button>
            <button style="background:transparent; color:red; border:1px solid red;" onclick="showScreen('scr-init')">ATRÁS</button>
        </div>
    </div>

    <!-- DOCENTE: MONITOR -->
    <div id="scr-doc-monitor" class="screen">
        <h2 id="mon-title" style="color:var(--neon-red);">AULA: ---</h2>
        <table class="monitor-table">
            <thead><tr><th>SECTOR</th><th>USER_01</th><th>USER_02</th><th>ESTADO</th><th>ACCIÓN</th></tr></thead>
            <tbody id="mon-body"></tbody>
        </table>
        <button onclick="location.reload()" style="width:200px; margin-top:20px;">CERRAR SISTEMA</button>
    </div>

    <!-- ESTUDIANTE: INGRESO -->
    <div id="scr-est-join" class="screen">
        <div class="menu-card">
            <h2>ACCESO</h2>
            <input type="text" id="est-aula-id" placeholder="CÓDIGO DE AULA">
            <button onclick="buscarSectores()">BUSCAR SECTORES</button>
            <div id="sector-list-container"></div>
            <button style="background:transparent; color:red; border:1px solid red; margin-top: 10px;" onclick="showScreen('scr-init')">ATRÁS</button>
        </div>
    </div>

    <!-- PANTALLA DE JUEGO -->
    <div id="scr-game" class="screen">
        <div id="header-info" style="position:absolute; top:10px; font-size:0.7rem; color:var(--neon-red); opacity:0.6;"></div>
        <div id="p1-s" class="score-badge" style="left:40px; color:var(--neon-red);">USER_01 > 0</div>
        <div id="p2-s" class="score-badge" style="right:40px; color:var(--p2-color); border-color:var(--p2-color);">USER_02 > 0</div>
        
        <div style="display:flex; align-items:center; gap:20px; margin-bottom:40px; z-index:10;">
            <div id="box1" class="math-box"></div>
            <div id="boxOp" style="font-size:3rem; color:var(--neon-red);"></div>
            <div id="box2" class="math-box"></div>
        </div>
        <div id="opts-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:15px; width:90%; max-width:420px; z-index:10;"></div>
        <button id="next-btn" onclick="generarRondaSync()">SIGUIENTE CICLO ⚔️</button>
    </div>

    <script>
        // ==========================================
        // REEMPLACE ESTAS CREDENCIALES CON LAS SUYAS
        // ==========================================
        const firebaseConfig = {
  apiKey: "AIzaSyADvCtH7BLTsTKxv6kGSLrMSd11eENGFMI",
  authDomain: "tronalgebra.firebaseapp.com",
  databaseURL: "https://tronalgebra-default-rtdb.firebaseio.com",
  projectId: "tronalgebra",
  storageBucket: "tronalgebra.firebasestorage.app",
  messagingSenderId: "705704589839",
  appId: "1:705704589839:web:04da89bf9bbdf167fb017a",
  measurementId: "G-X882DRZM4F"
};
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let ses = { aula:'', sala:'', pId:'', isMaster:false, op:'', lv:'' };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function clean(t) {
            return t.toString()
                .replace(/\^(\d+)/g, '<sup>$1</sup>')
                .replace(/ 1([a-z])/g, ' $1')
                .replace(/^1([a-z])/, '$1')
                .replace(/\+ -/g, '- ')
                .replace(/- -/g, '+ ');
        }

        // --- DOCENTE ---
        function crearAula() {
            const id = document.getElementById('doc-aula-id').value.toUpperCase().trim();
            const num = document.getElementById('doc-num').value;
            if(!id || !num) return alert("Faltan datos");

            const data = { 
                op: document.getElementById('doc-op').value, 
                lv: document.getElementById('doc-lv').value, 
                total: num 
            };
            
            for(let i=1; i<=num; i++) {
                data[`SALA_${i}`] = { scores:{p1:0, p2:0}, players:{p1:false, p2:false}, round:null };
            }
            db.ref("aulas/"+id).set(data).then(() => { ses.aula = id; abrirMonitor(); });
        }

        function abrirMonitor() {
            showScreen('scr-doc-monitor');
            document.getElementById('mon-title').innerText = "AULA: " + ses.aula;
            db.ref("aulas/"+ses.aula).on("value", snap => {
                const val = snap.val();
                const body = document.getElementById('mon-body');
                body.innerHTML = '';
                if(!val) return;
                for(let i=1; i<=val.total; i++) {
                    const s = val[`SALA_${i}`];
                    const status = (s.players.p1 && s.players.p2) ? "SINCRO" : "ESPERANDO";
                    body.innerHTML += `
                        <tr>
                            <td>SECTOR ${i}</td>
                            <td>${s.scores.p1}</td>
                            <td>${s.scores.p2}</td>
                            <td>${status}</td>
                            <td><button onclick="limpiarSector(${i})" style="width:auto; padding:5px; font-size:0.6rem; background:#333; color:white;">LIMPIAR</button></td>
                        </tr>`;
                }
            });
        }

        function limpiarSector(i) {
            db.ref(`aulas/${ses.aula}/SALA_${i}/players`).set({p1:false, p2:false});
            db.ref(`aulas/${ses.aula}/SALA_${i}/scores`).set({p1:0, p2:0});
        }

        // --- ESTUDIANTE ---
        function buscarSectores() {
            const id = document.getElementById('est-aula-id').value.toUpperCase().trim();
            if(!id) return alert("Ingrese el código del aula");
            
            const container = document.getElementById('sector-list-container');
            container.innerHTML = '<p style="color:var(--neon-red); font-size:0.8rem;">BUSCANDO EN LA RED...</p>';

            db.ref("aulas/"+id).once("value").then(snap => {
                if(!snap.exists()) {
                    container.innerHTML = '';
                    return alert("Aula no encontrada. Verifique el código.");
                }
                
                const val = snap.val();
                ses.aula = id; ses.op = val.op; ses.lv = val.lv;
                container.innerHTML = '';
                let sectoresDisponibles = 0;
                
                for(let i=1; i<=val.total; i++) {
                    const s = val[`SALA_${i}`];
                    const full = s.players && s.players.p1 && s.players.p2;
                    if(!full) {
                        sectoresDisponibles++;
                        const btn = document.createElement('button');
                        btn.innerText = `VINCULAR SECTOR ${i} ` + (s.players.p1 ? "(1/2)" : "(0/2)");
                        btn.onclick = () => unirse(i);
                        container.appendChild(btn);
                    }
                }
                
                if(sectoresDisponibles === 0) {
                    container.innerHTML = '<p style="color:var(--neon-red); font-size:0.8rem;">TODOS LOS SECTORES ESTÁN LLENOS</p>';
                }
            }).catch(err => {
                container.innerHTML = '';
                alert("Error de conexión. Intente de nuevo.");
            });
        }

        function unirse(i) {
            ses.sala = `SALA_${i}`;
            const playerRef = db.ref(`aulas/${ses.aula}/${ses.sala}/players`);
            
            const container = document.getElementById('sector-list-container');
            const backupHTML = container.innerHTML; // Guardamos los botones por si falla
            
            // Mensaje de carga
            container.innerHTML = '<h3 style="color:white; text-shadow:0 0 10px white; margin-top:20px;">ESTABLECIENDO CONEXIÓN...</h3><p style="color:var(--neon-red); font-size:0.7rem;">Sincronizando con la red Firebase</p>';
            
            // SEGURO ANTI-CONGELAMIENTO: Si pasan 6 segundos y no hay respuesta, abortar.
            let timeoutSeguridad = setTimeout(() => {
                container.innerHTML = backupHTML;
                alert("Tiempo de espera agotado. Revise su conexión a internet o los permisos de Firebase.");
            }, 6000);
            
            playerRef.transaction(currentPlayers => {
                if (!currentPlayers) return {p1: true, p2: false};
                if (!currentPlayers.p1) return {p1: true, p2: false};
                if (!currentPlayers.p2) return {p1: true, p2: true};
                return; // Sector lleno
            }, (error, committed, snapshot) => {
                
                clearTimeout(timeoutSeguridad); // La red respondió, cancelamos el seguro anti-congelamiento
                
                if (error) {
                    console.error("Error de Firebase:", error);
                    container.innerHTML = backupHTML; // Restauramos los botones
                    alert("Fallo en la red. Permisos denegados o sin conexión.");
                } else if (!committed) {
                    alert("El sector se llenó un milisegundo antes. Elija otro.");
                    buscarSectores(); // Recargar lista
                } else {
                    const status = snapshot.val();
                    ses.pId = status.p2 ? 'p2' : 'p1';
                    ses.isMaster = (ses.pId === 'p1');
                    
                    showScreen('scr-game');
                    document.getElementById('header-info').innerText = `${ses.aula} | ${ses.sala} | USER_0${ses.pId === 'p1' ? '1' : '2'}`;
                    
                    if(ses.isMaster) generarRondaSync();
                    escuchar();
                }
            });
        }

        // --- MOTOR ALGEBRAICO ---
        function generarRondaSync() {
            const getC = () => { let c = Math.floor(Math.random()*16)-8; return c===0?2:c; };
            let t1='', t2='', ans='', opSym='';

            if(ses.lv === '1') {
                let c1=getC(), c2=getC(), e1=Math.floor(Math.random()*3)+1;
                if(ses.op === 'div') {
                    let resC = getC(), dC = Math.floor(Math.random()*4)+2;
                    t1=`${resC*dC}x^3`; t2=`${dC}x`; ans=`${resC}x^2`; opSym='÷';
                } else if(ses.op === 'multi') {
                    t1=`${c1}x^2`; t2=`${c2}x`; ans=`${c1*c2}x^3`; opSym='×';
                } else {
                    t1=`${c1}x^2`; t2=`${c2}x^2`; ans=(ses.op==='suma'?c1+c2:c1-c2)+`x^2`; opSym=(ses.op==='suma'?'+':'-');
                }
            } else if(ses.lv === '2') {
                let n=getC(); t1=`(x + ${n})`; t2=`(x + 2)`;
                if(ses.op === 'multi') { ans=`x^2 + ${n+2}x + ${n*2}`; opSym='×'; }
                else { ans=(ses.op==='suma'?`2x + ${n+2}`:`${n-2}`); opSym=(ses.op==='suma'?'+':'-'); }
            } else {
                t1=`(x^2 + 4x)`; t2=`(2x)`;
                if(ses.op === 'multi') { ans=`2x^3 + 8x^2`; opSym='×'; }
                else { ans=(ses.op==='suma'?`x^2 + 6x`:`x^2 + 2x`); opSym=(ses.op==='suma'?'+':'-'); }
            }

            const correct = ans.replace(/\^1/g, '').replace(/\+ 0/g, '');
            const opts = [correct];
            while(opts.length < 4) {
                let d = correct.replace(/(-?\d+)/, m => parseInt(m) + (Math.random()>0.5?2:-2));
                if(!opts.includes(d)) opts.push(d);
            }

            db.ref(`aulas/${ses.aula}/${ses.sala}/round`).set({
                id: Date.now(), t1, t2, op: opSym, ans: correct, opts: opts.sort(() => Math.random()-0.5)
            });
        }

        function escuchar() {
            db.ref(`aulas/${ses.aula}/${ses.sala}`).on("value", snap => {
                const val = snap.val();
                if(!val) return;
                document.getElementById('p1-s').innerText = "USER_01 > " + (val.scores.p1 || 0);
                document.getElementById('p2-s').innerText = "USER_02 > " + (val.scores.p2 || 0);
                if(val.round && val.round.id !== ses.roundId) {
                    ses.roundId = val.round.id;
                    render(val.round);
                }
            });
        }

        function render(r) {
            document.getElementById('box1').innerHTML = clean(r.t1);
            document.getElementById('box2').innerHTML = clean(r.t2);
            document.getElementById('boxOp').innerText = r.op;
            document.getElementById('next-btn').style.display = 'none';
            const grid = document.getElementById('opts-grid');
            grid.innerHTML = '';
            r.opts.forEach(o => {
                const b = document.createElement('button');
                b.className = 'opt-card'; b.innerHTML = clean(o);
                b.onclick = () => {
                    if(o === r.ans) {
                        b.classList.add('correct');
                        db.ref(`aulas/${ses.aula}/${ses.sala}/scores/${ses.pId}`).transaction(s => (s||0)+1);
                        if(ses.isMaster) document.getElementById('next-btn').style.display = 'block';
                    } else { 
                        b.style.opacity = '0.3'; 
                        b.disabled = true; 
                    }
                };
                grid.appendChild(b);
            });
        }
    </script>
</body>
</html>
